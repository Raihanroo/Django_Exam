<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Excel & Manage Drafts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-top: 50px;
            margin-bottom: 50px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-weight: 600;
        }
        .upload-section {
            background-color: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .upload-section input[type="file"] {
            flex: 1;
            min-width: 200px;
        }
        .upload-section .btn {
            font-weight: 600;
            padding: 8px 20px;
        }
        .btn-upload {
            background-color: #007bff;
            color: white;
            border: none;
        }
        .btn-upload:hover {
            background-color: #0056b3;
        }
        .btn-approved {
            background-color: #28a745;
            color: white;
            border: none;
        }
        .btn-approved:hover {
            background-color: #218838;
        }
        .btn-approve {
            background-color: #ffc107;
            color: black;
            font-weight: bold;
            border: none;
            padding: 6px 15px;
            font-size: 0.9em;
        }
        .btn-approve:hover {
            background-color: #e0a800;
        }
        .alert {
            margin-bottom: 20px;
        }
        .table {
            margin-top: 20px;
        }
        .table thead {
            background-color: #343a40;
            color: white;
        }
        .table tbody tr {
            vertical-align: middle;
        }
        .table tbody tr:hover {
            background-color: #f5f5f5;
        }
        h3 {
            margin-top: 30px;
            margin-bottom: 20px;
            color: #333;
            font-weight: 600;
        }
        .pagination {
            margin-top: 20px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner-border {
            color: #007bff;
        }
        .nav-tabs {
            border-bottom: 2px solid #dee2e6;
            margin-bottom: 20px;
        }
        .nav-tabs .nav-link {
            color: #666;
            border: none;
            border-bottom: 3px solid transparent;
            padding: 10px 20px;
            font-weight: 600;
        }
        .nav-tabs .nav-link.active {
            color: #007bff;
            background-color: transparent;
            border-bottom: 3px solid #007bff;
        }
        .nav-tabs .nav-link:hover {
            color: #007bff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Upload Excel & Manage Drafts</h1>

        <!-- Messages -->
        <div id="messages-container"></div>

        <!-- Upload Section -->
        <div class="upload-section">
            <input type="file" id="excel-file" class="form-control" accept=".xlsx,.xls" onchange="updateFileName()">
            <button class="btn btn-upload" onclick="uploadExcel()" id="upload-btn">Upload Excel</button>
            <button class="btn btn-approved" onclick="goToApproved()">View Approved Products</button>
        </div>

        <!-- Draft Products Section -->
        <h3>Draft Products List</h3>
        <div id="drafts-content">
            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle text-center">
                    <thead>
                        <tr>
                            <th>Product ID</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Last Updated</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="7" style="text-align: center; color: #999; padding: 40px;">No draft products found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <nav id="pagination-container"></nav>
    </div>

    <!-- Approved Products Modal/Page -->
    <div id="approved-page" style="display: none;">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>Approved Products List</h1>
                <button class="btn btn-secondary" onclick="goToDrafts()">← Back to Upload</button>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="search-input" class="form-control" placeholder="Search by name or category..." onkeyup="searchApproved()" style="max-width: 500px;">
                <button class="btn btn-dark" onclick="searchApproved()">Search</button>
            </div>

            <div id="approved-content" class="loading">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p>Loading approved products...</p>
            </div>

            <!-- Pagination for Approved -->
            <nav id="approved-pagination-container"></nav>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/api/products';
        let allApprovedProducts = [];
        let currentPage = 1;
        let draftProducts = [];

        function updateFileName() {
            const file = document.getElementById('excel-file').files[0];
            if (file) {
                console.log('File selected:', file.name);
            }
        }

        async function uploadExcel() {
            const file = document.getElementById('excel-file').files[0];
            if (!file) {
                showMessage('Please select a file', 'danger');
                return;
            }

            const formData = new FormData();
            formData.append('excel_file', file);

            document.getElementById('upload-btn').disabled = true;
            document.getElementById('upload-btn').innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Uploading...';

            try {
                const response = await fetch(`${API_BASE}/upload_excel/`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message, 'success');
                    document.getElementById('excel-file').value = '';
                    setTimeout(() => {
                        loadDrafts();
                    }, 1000);
                } else {
                    showMessage(data.error || 'Upload failed', 'danger');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'danger');
            } finally {
                document.getElementById('upload-btn').disabled = false;
                document.getElementById('upload-btn').innerHTML = 'Upload Excel';
            }
        }

        async function loadDrafts(page = 1) {
            try {
                const response = await fetch(`${API_BASE}/drafts/?page=${page}&limit=1000`);
                const data = await response.json();
                draftProducts = data.results || data;

                let html = `
                    <div class="table-responsive">
                        <table class="table table-bordered table-striped align-middle text-center">
                            <thead>
                                <tr>
                                    <th>Product ID</th>
                                    <th>Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Last Updated</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                if (draftProducts.length === 0) {
                    html += `
                                <tr>
                                    <td colspan="7" style="text-align: center; color: #999; padding: 40px;">No draft products found.</td>
                                </tr>
                    `;
                } else {
                    draftProducts.forEach(product => {
                        html += `
                            <tr>
                                <td>${product.product_id}</td>
                                <td>${product.name}</td>
                                <td>${product.category}</td>
                                <td>$${parseFloat(product.price).toFixed(2)}</td>
                                <td>${product.quantity}</td>
                                <td>${new Date(product.last_updated).toLocaleDateString('en-US', {year: 'numeric', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit'})}</td>
                                <td>
                                    <button class="btn btn-approve btn-sm" onclick="approveProduct(${product.id})">Approve</button>
                                </td>
                            </tr>
                        `;
                    });
                }
                
                html += `
                            </tbody>
                        </table>
                    </div>
                `;

                document.getElementById('drafts-content').innerHTML = html;
            } catch (error) {
                console.error('Error loading drafts:', error);
                // Show table with header even on error
                let html = `
                    <div class="table-responsive">
                        <table class="table table-bordered table-striped align-middle text-center">
                            <thead>
                                <tr>
                                    <th>Product ID</th>
                                    <th>Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Last Updated</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="7" style="text-align: center; color: #999; padding: 40px;">No draft products found.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                `;
                document.getElementById('drafts-content').innerHTML = html;
            }
        }

        async function loadApproved(page = 1) {
            try {
                const response = await fetch(`${API_BASE}/approved/?page=${page}&limit=1000`);
                const data = await response.json();
                allApprovedProducts = data.results || data;

                displayApprovedProducts(allApprovedProducts);
            } catch (error) {
                console.error('Error loading approved:', error);
                document.getElementById('approved-content').innerHTML = '<div class="alert alert-danger">Error loading approved products</div>';
            }
        }

        function displayApprovedProducts(products) {
            let html = '';
            
            if (products.length === 0) {
                html = '<div class="empty-state"><p>No approved products found.</p></div>';
            } else {
                html = `
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover text-center align-middle">
                            <thead>
                                <tr>
                                    <th>Product ID</th>
                                    <th>Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Last Updated</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                products.forEach(product => {
                    html += `
                        <tr>
                            <td>${product.product_id}</td>
                            <td>${product.name}</td>
                            <td>${product.category}</td>
                            <td>$${parseFloat(product.price).toFixed(2)}</td>
                            <td>${product.quantity}</td>
                            <td>${new Date(product.last_updated).toLocaleDateString('en-US', {year: 'numeric', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit'})}</td>
                        </tr>
                    `;
                });
                
                html += `
                            </tbody>
                        </table>
                    </div>
                `;
            }

            document.getElementById('approved-content').innerHTML = html;
        }

        function searchApproved() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allApprovedProducts.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.category.toLowerCase().includes(query)
            );
            displayApprovedProducts(filtered);
        }

        async function approveProduct(id) {
            try {
                const response = await fetch(`${API_BASE}/${id}/approve/`, {
                    method: 'POST'
                });

                if (response.ok) {
                    showMessage('Product approved successfully!', 'success');
                    setTimeout(() => {
                        loadDrafts();
                    }, 500);
                } else {
                    showMessage('Failed to approve product', 'danger');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'danger');
            }
        }

        function goToApproved() {
            document.querySelector('.container').style.display = 'none';
            document.getElementById('approved-page').style.display = 'block';
            loadApproved();
        }

        function goToDrafts() {
            document.querySelector('.container').style.display = 'block';
            document.getElementById('approved-page').style.display = 'none';
            loadDrafts();
        }

        function showMessage(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            const container = document.getElementById('messages-container');
            container.insertBefore(alertDiv, container.firstChild);
            
            setTimeout(() => alertDiv.remove(), 5000);
        }

        // Load drafts on page load
        window.addEventListener('load', loadDrafts);
    </script>
</body>
</html>
